services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sentinel
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
      - ./data/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    # no host port — internal to the media stack only
    # host port 5432 is used by worker-postgres
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  sentinel:
    build: ./sentinels/personal-brand
    ports:
      - "8103:8103"
    environment:
      DATABASE_URL: postgresql://sentinel:${POSTGRES_PASSWORD}@postgres:5432/sentinel
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      POSTIZ_API_URL: ${POSTIZ_API_URL:-http://postiz:5000}
      POSTIZ_API_KEY: ${POSTIZ_API_KEY}
      POSTIZ_INTEGRATION_X: ${POSTIZ_INTEGRATION_X}
      POSTIZ_INTEGRATION_LINKEDIN: ${POSTIZ_INTEGRATION_LINKEDIN}
      POSTIZ_INTEGRATION_THREADS: ${POSTIZ_INTEGRATION_THREADS}
      POSTIZ_INTEGRATION_BLUESKY: ${POSTIZ_INTEGRATION_BLUESKY}
      SCHEDULED_POST_TIME: ${SCHEDULED_POST_TIME:-10:00}
      WORKER_TIMEOUT_SECONDS: ${WORKER_TIMEOUT_SECONDS:-15}
      SENTINEL_TIMEOUT_SECONDS: ${SENTINEL_TIMEOUT_SECONDS:-20}
      TEMPORAL_URL: ${TEMPORAL_URL:-temporal:7233}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-sentinel-tasks}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SENTINEL_PORT: 8103
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${N8N_WEBHOOK_PUBLIC_URL}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Postiz + Temporal stack ──
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    container_name: postiz
    restart: unless-stopped
    environment:
      MAIN_URL: 'http://100.67.51.66:4007'
      FRONTEND_URL: 'http://100.67.51.66:4007'
      NEXT_PUBLIC_BACKEND_URL: 'http://100.67.51.66:4007/api'
      JWT_SECRET: ${POSTIZ_JWT_SECRET}
      DATABASE_URL: 'postgresql://postiz-user:${POSTIZ_DB_PASSWORD}@postiz-postgres:5432/postiz-db-local'
      REDIS_URL: 'redis://postiz-redis:6379'
      BACKEND_INTERNAL_URL: 'http://localhost:3000'
      TEMPORAL_ADDRESS: 'temporal:7233'
      IS_GENERAL: 'true'
      DISABLE_REGISTRATION: 'false'
      STORAGE_PROVIDER: 'local'
      UPLOAD_DIRECTORY: '/uploads'
      NEXT_PUBLIC_UPLOAD_DIRECTORY: '/uploads'
      API_LIMIT: 30
      FEE_AMOUNT: 0.05
    volumes:
      - postiz-config:/config/
      - postiz-uploads:/uploads/
    ports:
      - '4007:5000'
    depends_on:
      postiz-postgres:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy

  postiz-postgres:
    image: postgres:17-alpine
    container_name: postiz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTIZ_DB_PASSWORD}
      POSTGRES_USER: postiz-user
      POSTGRES_DB: postiz-db-local
    volumes:
      - postiz-postgres-volume:/var/lib/postgresql/data
    expose:
      - 5432
    healthcheck:
      test: pg_isready -U postiz-user -d postiz-db-local
      interval: 10s
      timeout: 3s
      retries: 3

  postiz-redis:
    image: redis:7.2
    container_name: postiz-redis
    restart: unless-stopped
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - postiz-redis-data:/data
    expose:
      - 6379

  # ── Temporal (durable workflow engine for Postiz) ──
  temporal-elasticsearch:
    image: elasticsearch:7.17.27
    container_name: temporal-elasticsearch
    environment:
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=512mb
      - cluster.routing.allocation.disk.watermark.high=256mb
      - cluster.routing.allocation.disk.watermark.flood_stage=128mb
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false
    expose:
      - 9200
    volumes:
      - temporal-es-data:/usr/share/elasticsearch/data

  temporal-postgresql:
    image: postgres:16
    container_name: temporal-postgresql
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
    expose:
      - 5432
    volumes:
      - temporal-pg-data:/var/lib/postgresql/data

  temporal:
    image: temporalio/auto-setup:1.28.1
    container_name: temporal
    ports:
      - '7233:7233'
    depends_on:
      - temporal-postgresql
      - temporal-elasticsearch
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgresql
      - ENABLE_ES=true
      - ES_SEEDS=temporal-elasticsearch
      - ES_VERSION=v7
      - TEMPORAL_NAMESPACE=default
    restart: unless-stopped

  temporal-admin-tools:
    image: temporalio/admin-tools:1.28.1-tctl-1.18.4-cli-1.4.1
    container_name: temporal-admin-tools
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    depends_on:
      - temporal

  temporal-ui:
    image: temporalio/ui:2.34.0
    container_name: temporal-ui
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://127.0.0.1:3000
    ports:
      - '8081:8080'
    depends_on:
      - temporal

  janitor:
    build: ./janitor
    environment:
      TEMPORAL_URL: temporal:7233
      TEMPORAL_TASK_QUEUE: janitor-tasks
      JANITOR_CRON: ${JANITOR_CRON:-*/1 * * * *}
      DATABASE_URL: postgresql://sentinel:${POSTGRES_PASSWORD}@postgres:5432/sentinel
      STALE_THRESHOLD_MINUTES: ${STALE_THRESHOLD_MINUTES:-5}
      MAX_RETRIES: ${MAX_RETRIES:-3}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      temporal:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  n8n_data:
  postiz-config:
  postiz-uploads:
  postiz-postgres-volume:
  postiz-redis-data:
  temporal-es-data:
  temporal-pg-data:
