name: Deploy Sentinal Media

on:
  push:
    branches: [main]
    paths:
      - 'sentinels/**'
      - 'janitor/**'
      - 'docker-compose.yml'
      - '.env.example'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            # 1. Pull latest code
            cd ~/sentinels/media
            git pull origin main

            # 2. Rebuild and restart all services
            echo "=== Deploying sentinel-media stack ==="
            docker compose up -d --build

            # 3. Health check
            echo "=== Health check ==="
            sleep 5
            curl -sf http://100.67.51.66:8103/health 2>/dev/null && \
              echo "Sentinel OK" || echo "WARNING: Sentinel health check failed"
